# ===== 内容自动生产线配置 =====
# 复制本文件为 config.yaml，填入你的 API Key 等配置
# cp config.yaml.example config.yaml

# 输出目录
output_dir: "output"

# MiMo API (OpenAI 兼容格式)
mimo:
  api_key: "your-mimo-api-key"           # 替换为你的 MiMo API key
  base_url: "https://token-plan-cn.xiaomimimo.com/v1"
  model: "mimo-v2.5-pro"
  # TTS 语音合成配置（通过 chat completions 接口调用）
  tts_model: "mimo-v2.5-tts"              # 语音合成模型
  tts_voice: "Chloe"                       # 音色名称
  # tts_base_url: "https://your-tts-endpoint/v1"  # TTS专用地址（默认同 base_url）
  # Remotion 视频编排使用的 LLM 模型（默认同 model）
  planner_model: "mimo-v2.5-pro"

# 内容生成参数
generation:
  max_tokens: 4096
  temperature: 0.7
  # 每类别默认生成数量（道和术各生成几篇）
  default_limit: 1
  # 自动生成配图
  auto_image: true
  # 自动生成视频（抖音等视频平台）
  auto_video: true
  # 生图后端选择: dashscope(默认) / agnes
  image_provider: "dashscope"
  # 生视频后端选择: dashscope(默认) / agnes / remotion(文字动画，免费)
  video_provider: "dashscope"
  # 是否自动给生成的视频添加字幕
  video_subtitles: true
  video_subtitle_font: "Microsoft YaHei"
  video_subtitle_size: 48
  video_subtitle_line_chars: 16
  video_subtitle_max_lines: 1
  # 字幕样式（CapCut Mate 风格覆写）
  video_subtitle_text_color: "#FFFFFF"
  video_subtitle_border_color: "#000000"
  video_subtitle_alignment: 1            # 0-5, 1=底部居中
  video_subtitle_alpha: 1.0              # 文字不透明度 0.0-1.0
  video_subtitle_keyword_color: "#FFD700"  # 关键词高亮色
  video_subtitle_keyword_size:           # 关键词字号覆写（空=默认）
  video_subtitle_fade_in: 0.15           # 淡入时长(秒)
  video_subtitle_fade_out: 0.15          # 淡出时长(秒)
  video_subtitle_margin_v: 50            # 垂直边距(像素)
  video_subtitle_outline: 2              # 描边宽度
  video_subtitle_shadow: 1               # 阴影深度

# Qwen-Image 生图配置（阿里云百炼）
dashscope:
  api_key: "your-dashscope-api-key"      # 替换为你的百炼 API Key
  model: "qwen-image-2.0-pro"            # 可选: qwen-image / qwen-image-plus / qwen-image-max / qwen-image-2.0-pro
  size: "1472*1104"                       # 图片分辨率
  # 图片保存目录
  media_dir: "media"
  # 文生视频配置（Wan2.7-T2V）
  video_model: "wan2.7-t2v"              # 可选: wan2.7-t2v / wan2.7-t2v-plus
  video_size: "1280*720"                  # 视频分辨率
  # video_duration: 15                    # API 模型上限（非内容约束），Remotion 路径忽略此项

# Remotion 视频渲染配置（文字动画视频，时长由内容自动决定）
remotion:
  project_dir: "remotion"                 # Remotion 项目路径
  fps: 30                                 # 渲染帧率
  # browser_executable: ""                # 自定义 Chromium 路径（空=自动查找）
  # chrome_flags: ""                      # 额外 Chrome 启动参数

# Agnes AI API 生图/生视频配置
agnes:
  api_key: ""                             # 替换为你的 Agnes AI API Key
  image_model: "agnes-image-2.1-flash"    # 文生图模型
  video_model: "agnes-video-v2.0"         # 文生视频模型
  media_dir: "media"                      # 媒体文件保存目录
  # 视频生成默认参数
  video_width: 1152                       # 视频宽度
  video_height: 768                       # 视频高度
  video_num_frames: 121                   # 帧数 (必须是 8n+1，且 ≤ 441)
  video_frame_rate: 24                    # 帧率 (1-60)

# 热点监控
monitor:
  # 每次采集的最大热点数（每个数据源）
  max_topics: 10
  # 数据源配置
  sources:
    # 道：社会热点数据源
    dao:
      - toutiao              # 今日头条热榜
    # 术：AI技术热点数据源
    shu:
      - producthunt          # Product Hunt AI产品精选 (feed?ai)

# 发布平台配置
platforms:
  wechat:
    enabled: true                    # 是否启用该平台（内容生成 + 发布）
    app_id: "your-wechat-app-id"         # 微信公众号 AppID
    app_secret: "your-wechat-app-secret" # 微信公众号 AppSecret
    author: "作者名"                      # 作者名（不超过16字）
    # 发布模式: draft=存草稿, publish=直接发布
    mode: "draft"
    # 排版主题: claude / apple / wechat / notion
    theme: "claude"
    # 生成后是否用 LLM 校验内容质量（不达标则自动修复）
    validate_content: true
    # 最大修复次数（每次修复消耗一次 LLM 调用）
    max_repair: 1

  xiaohongshu:
    enabled: true                    # 是否启用该平台（内容生成 + 发布）
    # Playwright cookie 存储路径
    cookie_file: "db/xhs_cookies.json"
    # 是否无头模式（调试时设为 false）
    headless: false
    # 浏览器通道: chrome / msedge（使用系统已安装的浏览器）
    channel: "msedge"
    # 发布后等待秒数（留给验证码/审核弹窗处理时间）

  douyin:
    enabled: true                    # 是否启用该平台（内容生成 + 发布）
    # Playwright cookie 存储路径
    cookie_file: "db/douyin_cookies.json"
    # 是否无头模式
    headless: false
    # 浏览器通道: chrome / msedge（使用系统已安装的浏览器）
    channel: "msedge"
    # 发布后等待秒数（留给验证码/审核弹窗处理时间）
    post_publish_wait: 30

# 数据库
# 图片搜索（用于 Remotion image_text 场景配图）
image_search:
  provider: "pexels"              # pexels / unsplash / picsum / placeholder
  pexels_api_key: ""              # Pexels API key (https://www.pexels.com/api/)
  unsplash_access_key: ""         # Unsplash access key (https://unsplash.com/developers)
  download_dir: "media/images"    # 图片下载目录
  orientation: "portrait"         # portrait / landscape / square

database:
  path: "db/pipeline.db"

# 日志
logging:
  level: "INFO"
